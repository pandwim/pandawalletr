name: Build APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: corepack enable

      - run: yarn install

      - run: npx turbo build:pkg

      - run: chmod +x apps/mobile/build.sh

      - run: cd apps/mobile && yarn build

      - run: cd apps/mobile && yarn add @capacitor/android && yarn cap add android && yarn cap sync android

      - run: rm -rf ~/.gradle/caches/jars-9

      - run: cd apps/mobile/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: pandawalletr-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
